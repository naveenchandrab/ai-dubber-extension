<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Dubber</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-shell">
      <header>
        <h1>AI Dubber</h1>
      </header>
      <main>
        <div class="row">
          <label>
            <input id="toggleRunning" type="checkbox" />
            Enable dubbing
          </label>
        </div>
        <div class="row">
          <label for="languageSelect">Target language</label>
          <select id="languageSelect">
            <option value="Kannada">Kannada</option>
            <option value="Hindi">Hindi</option>
            <option value="Tamil">Tamil</option>
          </select>
        </div>
        <div class="status-row">
          <span>Status:</span>
          <strong id="statusLabel">Idle</strong>
        </div>
      </main>
      <footer>
        <small>Load this extension unpacked in Chrome.</small>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
